<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#091B2D" />
<title>뽀송코킹 — 외벽 실리콘 코킹 전문</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Noto+Serif+KR:wght@400;600;700;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  html, body { margin:0; padding:0; background:#FBFAF6; scroll-behavior: smooth; }
  body { font-family: 'Pretendard', -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  *, *::before, *::after { box-sizing: border-box; }
  /* iOS 입력 줌 방지 */
  input, select, textarea { font-size: 16px; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(15,42,68,0.2); border-radius: 4px; }
  /* desktop 영역에서만 모바일 padding 제거 */
  #root { width: 100%; }
  /* mobile container은 100dvh */
  .mobile-shell { width: 100%; min-height: 100vh; min-height: 100dvh; position: relative; background: #091B2D; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="variants/variant-a-navy.jsx"></script>
<script type="text/babel" src="variants/mobile-a-navy.jsx"></script>
<script type="text/babel" data-presets="react">
  // 반응형 라우터: 1024px 이상이면 데스크탑 A안, 미만이면 모바일 A안
  function ResponsiveSite() {
    const [isDesktop, setIsDesktop] = React.useState(
      typeof window !== 'undefined' ? window.innerWidth >= 1024 : true
    );
    React.useEffect(() => {
      const onResize = () => setIsDesktop(window.innerWidth >= 1024);
      window.addEventListener('resize', onResize);
      return () => window.removeEventListener('resize', onResize);
    }, []);

    if (isDesktop) {
      // 데스크탑: A-Navy 변형 풀 페이지
      return (
        <div style={{ background: '#FBFAF6' }}>
          <VariantANavy />
        </div>
      );
    }
    // 모바일: 모바일 A-Navy (탭 네비, sticky CTA)
    return (
      <div className="mobile-shell">
        <MobileANavy />
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<ResponsiveSite />);
</script>
</body>
</html>
