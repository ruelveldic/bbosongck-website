<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#091B2D" />
<title>뽀송코킹 — 외벽 실리콘 코킹 전문</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Noto+Serif+KR:wght@400;600;700;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  html, body { margin:0; padding:0; background:#FBFAF6; scroll-behavior: smooth; }
  body { font-family: 'Pretendard', -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  *, *::before, *::after { box-sizing: border-box; }
  /* iOS 입력 줌 방지 */
  input, select, textarea { font-size: 16px; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(15,42,68,0.2); border-radius: 4px; }
  /* desktop 영역에서만 모바일 padding 제거 */
  #root { width: 100%; }
  /* mobile container은 100dvh */
  .mobile-shell { width: 100%; min-height: 100vh; min-height: 100dvh; position: relative; background: #091B2D; }

  /* 카카오 플로팅 버튼 (데스크탑 전용) */
  @keyframes kakaoFloatIn {
    from { opacity: 0; transform: translateY(12px) scale(0.92); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .kakao-fab {
    animation: kakaoFloatIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) 0.6s both;
  }
  .kakao-fab-desktop:hover {
    transform: translateY(-2px);
    box-shadow: 0 14px 32px rgba(0,0,0,0.22);
  }
</style>
<script>
  // ──────────────────────────────────────────────────────────────
  // 카카오톡 채널 ID — 변경 시 이 한 줄만 수정
  // 카카오톡 채널 관리자센터 > 관리 > 상세설정 > 검색용 ID
  // ──────────────────────────────────────────────────────────────
  window.KAKAO_CHANNEL_ID = '_uBnmn';
</script>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="variants/variant-a-navy.jsx"></script>
<script type="text/babel" src="variants/mobile-a-navy.jsx"></script>
<script type="text/babel" data-presets="react">
  // ──────────────────────────────────────────────────────────────
  // 카카오톡 1:1 상담 플로팅 버튼 (데스크탑 전용)
  // 모바일은 mobile-a-navy.jsx의 StickyCTA "카톡 문의" 버튼이 담당
  // ──────────────────────────────────────────────────────────────
  const KakaoIcon = ({ size = 22 }) => (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path
        d="M12 3.5C6.753 3.5 2.5 6.86 2.5 11c0 2.654 1.74 4.984 4.36 6.328-.192.7-.696 2.532-.797 2.926-.125.49.179.483.376.351.155-.103 2.466-1.676 3.464-2.354.69.102 1.4.155 2.097.155 5.247 0 9.5-3.36 9.5-7.5s-4.253-7.5-9.5-7.5z"
        fill="#3C1E1E"
      />
    </svg>
  );

  const KakaoChannelButton = () => {
    const href = `http://pf.kakao.com/${window.KAKAO_CHANNEL_ID}/chat`;
    return (
      <a
        className="kakao-fab kakao-fab-desktop"
        href={href}
        target="_blank"
        rel="noopener noreferrer"
        aria-label="카카오톡 1:1 상담하기"
        style={{
          position: 'fixed',
          bottom: 28,
          right: 28,
          background: '#FEE500',
          color: '#3C1E1E',
          padding: '14px 22px 14px 18px',
          borderRadius: 100,
          display: 'flex',
          alignItems: 'center',
          gap: 10,
          fontWeight: 700,
          fontSize: 15,
          textDecoration: 'none',
          boxShadow: '0 8px 24px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.06)',
          transition: 'transform 0.2s cubic-bezier(0.2,0.8,0.2,1), box-shadow 0.2s ease',
          zIndex: 60,
          fontFamily: "'Pretendard', sans-serif",
          letterSpacing: '-0.01em',
        }}
      >
        <KakaoIcon size={22} />
        <span>카카오톡 1:1 상담</span>
      </a>
    );
  };

  // ──────────────────────────────────────────────────────────────
  // 반응형 라우터: 1024px 이상이면 데스크탑 A안, 미만이면 모바일 A안
  // ──────────────────────────────────────────────────────────────
  function ResponsiveSite() {
    const [isDesktop, setIsDesktop] = React.useState(
      typeof window !== 'undefined' ? window.innerWidth >= 1024 : true
    );
    React.useEffect(() => {
      const onResize = () => setIsDesktop(window.innerWidth >= 1024);
      window.addEventListener('resize', onResize);
      return () => window.removeEventListener('resize', onResize);
    }, []);

    if (isDesktop) {
      return (
        <div style={{ background: '#FBFAF6' }}>
          <VariantANavy />
          <KakaoChannelButton />
        </div>
      );
    }
    return (
      <div className="mobile-shell">
        <MobileANavy />
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<ResponsiveSite />);
</script>
</body>
</html>
